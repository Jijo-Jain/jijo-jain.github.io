function Navbar() {

    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-md border-b border-gray-200' : 'bg-transparent'}`}>
